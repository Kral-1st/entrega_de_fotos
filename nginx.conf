# ── API: api-fotos.carlangas.dpdns.org ────────────────────────────────────────
server {
    listen 80;
    server_name api-fotos.carlangas.dpdns.org;

    # Si usas Cloudflare Tunnel, escucha en el puerto que tengas configurado
    # y ajusta según tu setup

    location / {
        proxy_pass http://127.0.0.1:3555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Para uploads grandes
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}

# ── Frontend: fotos.carlangas.dpdns.org ───────────────────────────────────────
server {
    listen 80;
    server_name fotos.carlangas.dpdns.org;

    root /mnt/almacenamiento/entrega_de_fotos/client;
    index index.html;

    # Admin panel
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Galería pública: /p/:slug → gallery/index.html?slug=:slug
    location ~ ^/p/([^/]+)$ {
        set $slug $1;
        rewrite ^ /gallery/index.html?slug=$slug last;
    }

    # Archivos estáticos del gallery
    location /gallery/ {
        try_files $uri $uri/ =404;
    }

    # Shared assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Default - redirigir al admin
    location = / {
        return 302 /admin/;
    }
}
