<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Entrega de Fotos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo .mark {
      display: inline-block;
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .login-logo h1 {
      font-size: 1.25rem;
      color: var(--text);
    }

    .login-logo p {
      font-size: .85rem;
      color: var(--text-2);
      margin-top: 4px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-form .btn--primary {
      width: 100%;
      justify-content: center;
      padding: 12px;
      font-size: .95rem;
    }

    .error-msg {
      color: var(--danger-2);
      font-size: .85rem;
      text-align: center;
      min-height: 20px;
    }
  </style>
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="mark">
        <svg width="24" height="24" fill="none" stroke="#0f0f0f" stroke-width="2" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h1>Entrega de Fotos</h1>
      <p>Panel de administración</p>
    </div>

    <div class="card">
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            class="input"
            placeholder="••••••••"
            autofocus
            autocomplete="current-password"
          >
        </div>
        <p class="error-msg" id="errorMsg"></p>
        <button type="submit" class="btn btn--primary" id="submitBtn">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
